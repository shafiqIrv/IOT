; Classic ESP32 (ESP32-WROOM / DevKit v1). Default I2C pins: SDA=GPIO21, SCL=GPIO22.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library
  knolleary/PubSubClient

; ESP32-S3 DevKitC-1
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
  sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library
  knolleary/PubSubClient

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
  -std=c++17
build_src_filter =
  +<metrics_processor.cpp>
  +<metrics_payload.cpp>
  +<apnea_features.cpp>
  +<apnea_model.cpp>
  +<apnea_model_data.cpp>
